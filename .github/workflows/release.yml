# ============================================================
# release.yml — ProtoAI Windows Release Pipeline
# Triggers on version tags (v*) or manual dispatch.
#
# Steps:
#   1. Checkout + toolchain setup (Node 20, Rust stable MSVC)
#   2. Bundle embedded Python 3.11 into resources/python-embed/
#   3. npm ci + tauri build
#   4. Publish GitHub Release with updater JSON
#   5. SignPath signing — UNCOMMENT once credentials are ready
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_EMBED_VERSION: '3.11.9'
  PYTHON_EMBED_URL: 'https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip'
  GET_PIP_URL: 'https://bootstrap.pypa.io/get-pip.py'
  NODE_VERSION: '20'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tauri-app/package.json

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri -> target

      # Downloads the official Windows embeddable Python (~12 MB).
      # Users do NOT need Python installed separately.
      - name: Bundle embedded Python 3.11 runtime
        shell: pwsh
        run: |
          $dest = "tauri-app/src-tauri/resources/python-embed"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          Write-Host "Downloading embedded Python $env:PYTHON_EMBED_VERSION..."
          Invoke-WebRequest -Uri $env:PYTHON_EMBED_URL -OutFile "python-embed.zip" -UseBasicParsing
          Expand-Archive -Path "python-embed.zip" -DestinationPath $dest -Force

          # Patch ._pth to enable site-packages (required for pip)
          $pthFile = Get-ChildItem $dest -Filter "*.pth" | Select-Object -First 1
          if ($pthFile) {
            (Get-Content $pthFile.FullName) -replace '#import site', 'import site' |
              Set-Content $pthFile.FullName
            Write-Host "Patched $($pthFile.Name) to enable site-packages"
          }

          # Bundle get-pip.py so bootstrap.py can install pip on first run
          Invoke-WebRequest -Uri $env:GET_PIP_URL -OutFile "$dest/get-pip.py" -UseBasicParsing
          Write-Host "Embedded Python bundle ready:"
          Get-ChildItem $dest | Select-Object Name, Length | Format-Table -AutoSize

      - name: Install Node dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri-app
          tagName: ${{ github.ref_name }}
          releaseName: 'ProtoAI ${{ github.ref_name }}'
          releaseBody: |
            ## ProtoAI ${{ github.ref_name }}

            ### Installation
            1. Download and run **ProtoAI_x64-setup.exe**
            2. Launch ProtoAI
            3. First launch: open **Settings → Local AI → Setup Local AI** to install
               the Qwen2.5-Omni-7B model (one-time ~4 GB Python env + ~15 GB model download)

            ### What's bundled
            - ProtoAI desktop app (Tauri + Node.js sidecar)
            - Embedded Python 3.11 runtime (no separate Python install required)
            - Qwen2.5-Omni-7B inference server (model downloaded from HuggingFace on first setup)

            ### Auto-updates
            ProtoAI checks for updates automatically and will notify you when a new version is available.
          releaseDraft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          includeUpdaterJson: true

      # ── SignPath code signing ──────────────────────────────
      # ACTIVATE once your SignPath.org application is approved.
      # Add secrets: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID
      #
      # - name: Sign installer with SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      #     project-slug: 'protoai'
      #     signing-policy-slug: 'release-signing'
      #     artifact-configuration-slug: 'windows-installer'
      #     github-artifact-id: ${{ steps.tauri-build.outputs.artifactId }}
      #     wait-for-completion: true
      #     output-artifact-directory: signed-artifacts/

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: protoai-windows-${{ github.ref_name }}
          path: |
            tauri-app/src-tauri/target/release/bundle/nsis/*.exe
            tauri-app/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
